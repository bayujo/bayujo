name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics (private contributions included via PAT)
        uses: lowlighter/metrics@latest
        with:
          # PAT you create — repo secret. Scopes: classic PAT with `repo` + `read:user`.
          # The user's own token is what lets contribution counts include PRIVATE repos.
          token: ${{ secrets.METRICS_TOKEN }}
          user: bayujo
          filename: github-metrics.svg
          template: classic
          # header only = compact identity + contribution count (incl private via PAT).
          # Dropped activity/community/repositories — those event/repo lists were the
          # "texty / repeated" part. Everything below is graphical.
          base: "header"
          config_timezone: Asia/Jakarta

          # Full-year 3D contribution calendar — counts private commits with the PAT.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Language donut — indepth analyses private repos too (PAT has repo scope),
          # so percentages reflect real (private-heavy) work, not just public.
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_limit: 8
